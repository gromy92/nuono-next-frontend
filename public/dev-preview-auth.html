<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>开发预览跳转</title>
    <style>
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f5f7fb;
        color: #0f172a;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
      }
      .card {
        width: min(520px, calc(100vw - 32px));
        background: #fff;
        border: 1px solid #dbe4ea;
        border-radius: 16px;
        padding: 24px;
        box-shadow: 0 16px 40px rgba(15, 23, 42, 0.08);
      }
      .title {
        margin: 0 0 8px;
        font-size: 24px;
        font-weight: 700;
      }
      .desc {
        margin: 0;
        color: #64748b;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1 class="title">正在进入开发预览</h1>
      <p class="desc">正在写入本地演示登录态并跳转到人工选品页面，请稍候。</p>
    </div>
    <script>
      (function () {
        const payload = {
          userId: 1,
          accountNo: 'admin',
          realName: '演示账号',
          roleId: 1,
          roleName: '管理员',
          companyName: 'Nuono Demo',
          status: 1,
          storeCount: 1,
          authorizedStoreCount: 1,
          bindingStatus: 'PROJECT_BOUND',
          defaultOwnerUserId: 10002,
          grantedMenus: []
        };
        const params = new URLSearchParams(window.location.search);
        const target = params.get('target') || '/product/manual-selection';
        window.localStorage.setItem('nuono-next-session', JSON.stringify(payload));
        window.location.replace(target);
      })();
    </script>
  </body>
  </html>
