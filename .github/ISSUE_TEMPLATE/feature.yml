name: Feature slice
description: Track a Nuono Next implementation slice
title: "[Feature]: "
labels: ["needs-triage"]
body:
  - type: dropdown
    id: module
    attributes:
      label: Module
      options:
        - Procurement
        - Noon Data
        - File Management
        - Operations Config
        - Sales Lifecycle
        - Product Management
        - System Foundation
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - P0
        - P1
        - P2
        - P3
    validations:
      required: true
  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: State the user-visible or operator-visible outcome.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Use concrete checks, API calls, UI paths, or business states.
    validations:
      required: true
  - type: textarea
    id: actor_scope
    attributes:
      label: Actor and business scope
      description: Name the actor/role, environment, store/site/project, and representative SKU/order/batch/task.
      placeholder: "Actor: boss; Environment: test; Store/site: STR... / SA; Business key: ..."
    validations:
      required: true
  - type: textarea
    id: boundaries
    attributes:
      label: Scope, data, and external-write boundaries
      description: State non-scope, facts that must not be overwritten, and whether external writes are disabled, dry-run, or human-triggered.
    validations:
      required: true
  - type: textarea
    id: rollback
    attributes:
      label: Rollback or disable path
      description: Describe how to remove, disable, or safely roll back the slice.
    validations:
      required: true
  - type: textarea
    id: source
    attributes:
      label: Source context
      description: Link the originating PRD, local .scratch file, module hub, decision, or prior issue.
    validations:
      required: true
