name: System defect
description: Track a reproducible defect through root cause, regression, and business recovery
title: "[Bug]: "
labels: ["needs-triage"]
body:
  - type: dropdown
    id: module
    attributes:
      label: Module
      options:
        - Procurement
        - Procurement Plugin and Logistics
        - Noon Data
        - File Management
        - Operations Config
        - Sales Lifecycle
        - Product Management
        - Warehouse Dispatch
        - Competitor Analysis
        - System Foundation
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      description: P0 data/security/wrong external write; P1 core journey broken; P2 degraded with workaround; P3 minor.
      options: [P0, P1, P2, P3]
    validations:
      required: true
  - type: textarea
    id: capability
    attributes:
      label: Affected capability and actors
      description: Name the full user capability, affected roles, owner/store/site/object scope, and business keys.
    validations:
      required: true
  - type: textarea
    id: symptom
    attributes:
      label: Symptom and business impact
      description: What is wrong, which journey step fails, frequency, workaround, and operational impact.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: Environment, login role, URL/API, inputs, expected state, and actual state.
    validations:
      required: true
  - type: textarea
    id: data_external_impact
    attributes:
      label: Data, authorization, and external-write impact
      description: State confirmed impact or explicitly state what remains unknown and how it will be checked.
    validations:
      required: true
  - type: textarea
    id: containment
    attributes:
      label: Containment and recovery
      description: Immediate stop line, affected records/tasks, safe recovery path, and whether production exposure must stop.
    validations:
      required: true
  - type: textarea
    id: diagnosis
    attributes:
      label: Initial diagnosis and similar surfaces
      description: Suspected boundary, related entry points, prior fixes, logs, task IDs, screenshots, or evidence paths.
    validations:
      required: true
  - type: textarea
    id: closure
    attributes:
      label: Closure evidence required
      description: Root cause, same-class audit, regression test, historical correction, full-journey acceptance, and observation.
    validations:
      required: true
