name: Frontend CI

on:
  pull_request:
    branches:
      - develop
      - master
  push:
    branches:
      - develop
      - master

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Validate delivery contract
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || '';
            const requiredHeadings = [
              '## Tracking',
              '## Summary',
              '## Scope',
              '## Acceptance',
              '## Verification',
              '## Risk and rollback'
            ];
            const missingHeadings = requiredHeadings.filter((heading) => !body.includes(heading));
            const issueReference = /(?:refs?|closes?|fixes?|resolves?):\s*(?:[\w.-]+\/[\w.-]+)?#\d+/i;
            const requiredFields = [
              /^- Module:\s*\S+/mi,
              /^- Actor:\s*\S+/mi,
              /^- Store\/site\/business key:\s*\S+/mi,
              /^- In scope:\s*\S+/mi,
              /^- Non-scope:\s*\S+/mi,
              /^- Environment:\s*\S+/mi,
              /^- Rollback:\s*\S+/mi
            ];
            const missingFields = requiredFields
              .map((pattern) => pattern.source)
              .filter((_, index) => !requiredFields[index].test(body));

            if (!issueReference.test(body) || missingHeadings.length > 0 || missingFields.length > 0) {
              core.setFailed([
                'PR delivery contract is incomplete.',
                !issueReference.test(body) ? 'Add `Refs: #<issue>` (cross-repo references are allowed).' : '',
                missingHeadings.length ? `Missing headings: ${missingHeadings.join(', ')}` : '',
                missingFields.length ? 'Fill Module, Actor, Store/site/business key, In scope, Non-scope, Environment, and Rollback.' : ''
              ].filter(Boolean).join('\n'));
            }

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Source-size policy self-test
        run: node --test scripts/source_size_policy.test.mjs

      - name: Enforce source-file size
        env:
          SOURCE_SIZE_BASE_REF: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
        run: node scripts/check_source_size.mjs

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_ENV"

      - name: Set up pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Product baseline display contract
        run: pnpm product-baseline:display-contract

      - name: Source contract tests
        run: pnpm contract:test

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build
